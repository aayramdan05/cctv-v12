server {
    listen 80 default_server;
    server_name _;

    # KEAMANAN: Hanya ijinkan IP Server Master untuk akses langsung ke IP Node ini
    # Ganti [IP_MASTER] dengan IP Server Master Unpad (misal 10.69.69.10)
    allow 10.69.69.21;
    allow 127.0.0.1;
    deny all;

    # Jalur File Rekaman & Snapshots
    location /storage/ {
        alias /var/www/html/storage/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=3600";
        add_header Accept-Ranges bytes;

        location ~* \.(jpg|jpeg|png)$ {
            add_header Content-Type image/jpeg;
            add_header Access-Control-Allow-Origin *;
        }
    }

    # Jalur Live Stream (Go2RTC)
    location / {
        # Tambahkan header CORS supaya HLS (m3u8) mau jalan di Mobile
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;

        # Handle OPTIONS request (Penting untuk mobile player)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://127.0.0.1:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
