server {
    listen 80;

    # Hanya IP Master dan Domain
    server_name cctv.unpad.net 10.69.69.21;

    # Root Folder Project Laravel 12
    root /home/aay/cctv-v12/public;

    # --- LOGGING ---
    error_log /var/log/nginx/cctv_error.log warn;
    access_log /var/log/nginx/cctv_access.log;

    # --- TRUST PROXY ---
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Security Headers
    add_header Content-Security-Policy "frame-ancestors 'self' https://thingsboard.unpad.dev;";
    add_header X-Content-Type-Options "nosniff";

    index index.php;
    charset utf-8;

    # =========================================================
    #  BAGIAN WHITELIST STATIC FILES (BYPASS AUTH)
    #  Agar video-stream.js bisa di-load browser tanpa token
    # =========================================================

    # 1. Whitelist WebSocket Node 1 (Local Master)
    location = /node1/api/ws {
        rewrite ^/node1/(.*) /$1 break;
        proxy_pass http://10.69.69.21:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Origin "";
    }

    # 2. Whitelist WebSocket Node 2 (Remote Node)
    location = /node2/api/ws {
        rewrite ^/node2/(.*) /$1 break;
        proxy_pass http://10.69.69.39:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Origin "";
    }

    # Whitelist Static Assets Node 1
    location ~ ^/node1/.*\.(js|css|json|png|jpg|ico)$ {
        rewrite ^/node1/(.*) /$1 break;
        proxy_pass http://10.69.69.21:1984;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Whitelist Static Assets Node 2
    location ~ ^/node2/.*\.(js|css|json|png|jpg|ico)$ {
        rewrite ^/node2/(.*) /$1 break;
        proxy_pass http://10.69.69.39:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # =========================================================
    #  BAGIAN A: NODE 1 (10.69.69.21 - LOCAL MASTER)
    #  Tetap dijaga untuk kompatibilitas/backup
    # =========================================================

    location /node1/storage/ {
        auth_request /auth-video;
        rewrite ^/node1/(.*) /$1 break;
        proxy_pass http://10.69.69.21:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /node1/playback/ {
        auth_request /auth-video;
        rewrite ^/node1/(.*) /$1 break;
        proxy_pass http://10.69.69.21:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /node1/ {
        auth_request /auth-video;
        rewrite ^/node1/(.*) /$1 break;
        proxy_pass http://10.69.69.21:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Origin "";
    }

    # =========================================================
    #  BAGIAN B: NODE 2 (10.69.69.39 - REMOTE NODE)
    #  Semua CCTV sekarang aktif di sini
    # =========================================================

    location /node2/build/ {
        proxy_pass http://10.69.69.39:80/build/;
        proxy_set_header Host $host;
        access_log off;
        expires max;
    }

    location /node2/storage/ {
        auth_request /auth-video;
        rewrite ^/node2/(.*) /$1 break;
        proxy_pass http://10.69.69.39:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /node2/playback/ {
        auth_request /auth-video;
        rewrite ^/node2/(.*) /$1 break;
        proxy_pass http://10.69.69.39:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /node2/ {
        auth_request /auth-video;
        rewrite ^/node2/(.*) /$1 break;
        proxy_pass http://10.69.69.39:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Origin "";
    }

    # =========================================================
    #  BAGIAN C: JALUR KHUSUS MASTER (AKSES LANGSUNG)
    # =========================================================

    location ~ ^/(video-rtc|webrtc|mse|video-stream|webrtc-adapter|adapter|static)\.(html|js|css|json)$ {
        proxy_pass http://127.0.0.1:1984;
        proxy_set_header Host $host;
    }

    location = /api/ws {
        proxy_pass http://127.0.0.1:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Origin "";
    }

    location ~ ^/api/(stream|frame|streams|images|hls) {
        proxy_pass http://127.0.0.1:1984;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # =========================================================
    #  BAGIAN D: AUTH INTERNAL & FALLBACK (VALIDASI RBAC)
    # =========================================================

    location = /auth-video {
        internal;

        # Panggil PHP-FPM Langsung
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        include fastcgi_params;

        # Hardcode Lokasi File index.php Laravel
        fastcgi_param SCRIPT_FILENAME /home/aay/cctv-v12/public/index.php;

        # Point ke rute verifikasi di Laravel
        fastcgi_param REQUEST_URI /auth-stream-verify;
        fastcgi_param REQUEST_METHOD GET;
        fastcgi_param HTTP_COOKIE $http_cookie;

        # Kirim URL Asli ke Header agar Laravel bisa cek ID Kamera (Regex Support)
        fastcgi_param HTTP_X_ORIGINAL_URI $request_uri;

        # Matikan body request untuk kecepatan
        fastcgi_pass_request_body off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /build/ {
        alias /home/aay/cctv-v12/public/build/;
        access_log off;
        expires max;
        include /etc/nginx/mime.types;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTPS on;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
